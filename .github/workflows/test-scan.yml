name: Test AI-BOM Scanner

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build and Run AIcap from Source
        env:
          AICAP_API_KEY: ${{ secrets.AICAP_API_KEY }}
        run: |
          go build -o aicap .
          ./aicap --cli .
