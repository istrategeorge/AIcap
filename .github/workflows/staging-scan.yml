name: Staging AI-BOM Scanner

on:
  push:
    branches: [ "development" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build and Run AIcap for Staging
        env:
          AICAP_API_KEY: ${{ secrets.AICAP_API_KEY }} # Or a dedicated staging key
          AICAP_API_URL: "https://aicap-staging.onrender.com/api/save-proof"
        run: |
          go build -o aicap .
          ./aicap --cli .