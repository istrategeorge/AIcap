name: Go tests

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    # Matches docker-compose.yml and TEST_DATABASE_URL in the local dev loop,
    # so `go test -tags=integration` behaves identically on a laptop and in CI.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aicap
          POSTGRES_PASSWORD: aicap
          POSTGRES_DB: aicap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aicap -d aicap"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: go test (integration)
        env:
          TEST_DATABASE_URL: postgres://aicap:aicap@localhost:5432/aicap?sslmode=disable
        run: go test -tags=integration ./...
