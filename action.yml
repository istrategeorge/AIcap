name: "Continuous AI-BOM Scanner"
description: "Automated EU AI Act compliance scanner. Detects AI models, dependencies, and FinOps risks."
author: "AIcap"

branding:
  icon: 'shield'
  color: 'indigo'

inputs:
  scan-directory:
    description: "The directory to scan for AI dependencies"
    required: false
    default: "."
  supabase-url:
    description: "Optional: Supabase DB URL to persist the Immutable Proof Drill"
    required: false

runs:
  using: "composite"
  steps:
    - name: Download AIcap Scanner
      shell: bash
      run: |
        echo "⬇️ Downloading AIcap v1.0.0-alpha statically-linked binary..."
        curl -sL https://github.com/istrategeorge/AIcap/releases/download/1.0.0-alpha/aicap-linux-amd64 -o aicap
        chmod +x aicap

    - name: Execute AI-BOM Scan
      shell: bash
      env:
        SUPABASE_DB_URL: ${{ inputs.supabase-url }}
      run: |
        echo "🔍 Starting Continuous AI-BOM Scan on directory: ${{ inputs.scan-directory }}"
        ./aicap --cli