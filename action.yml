name: "Continuous AI-BOM Scanner"
description: "Automated EU AI Act compliance scanner. Detects AI models, dependencies, and FinOps risks."
author: "AIcap"

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  scan-directory:
    description: "The directory to scan for AI dependencies"
    required: false
    default: "."
  api-key:
    description: "Pro Tier: Your AIcap API Key to sync results to your dashboard"
    required: false

runs:
  using: "composite"
  steps:
    - name: Download AIcap Scanner
      shell: bash
      run: |
        echo "⬇️ Downloading AIcap v1.0.0-beta statically-linked binary..."
        curl -sL https://github.com/istrategeorge/AIcap/releases/download/1.0.0-beta/aicap-linux-amd64 -o aicap
        chmod +x aicap

    - name: Execute AI-BOM Scan
      shell: bash
      env:
        AICAP_API_KEY: ${{ inputs.api-key }}
      run: |
        echo "🔍 Starting Continuous AI-BOM Scan on directory: ${{ inputs.scan-directory }}"
        ./aicap --cli "${{ inputs.scan-directory }}"
